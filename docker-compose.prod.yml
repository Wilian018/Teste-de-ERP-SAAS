version: '3.8'

services:
  db:
    image: postgres:15
    container_name: erp_pdv_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword123
      POSTGRES_DB: erp_pdv_db
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_pdv_api
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://postgres:supersecretpassword123@db:5432/erp_pdv_db?schema=public"
      JWT_SECRET: "prod_secret_key"
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp_pdv_web
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata_prod:
